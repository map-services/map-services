name: map-services

networks:
  default:
  hetzner-cloud:
    external: true

volumes:
  config_volume:

services:
  du-exporter:
    container_name: du_exporter
    image: ghcr.io/rm-hull/du-exporter:latest
    command:
      - "--root=/data"
      - "--port=8080"
    volumes:
      - ./data:/data:ro
    restart: always
    healthcheck:
      disable: false
    networks:
      - default
      - hetzner-cloud

  mapproxy-config-generator:
    image: alpine
    container_name: mapproxy_config_generator
    environment:
      - OS_DATAHUB_API_KEY=${OS_DATAHUB_API_KEY}
    volumes:
      - ./mapproxy.template.yaml:/tmp/mapproxy.template.yaml
      - config_volume:/output
    command: >
      sh -c "
        apk add --no-cache gettext &&
        envsubst < /tmp/mapproxy.template.yaml > /output/mapproxy.yaml
      "

  mapproxy:
    container_name: mapproxy
    restart: unless-stopped
    image: ghcr.io/mapproxy/mapproxy/mapproxy:6.0.1-alpine-nginx
    depends_on:
      mapproxy-config-generator:
        condition: service_completed_successfully
    volumes:
      - config_volume:/mapproxy/config
      - ./data/mapproxy/cache_data:/mapproxy/cache_data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.mapproxy.entrypoints=websecure"
      - "traefik.http.routers.mapproxy.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/mapproxy/wmts/wmts`)"
      - "traefik.http.services.mapproxy.loadbalancer.server.port=80"
    networks:
      - default
      - hetzner-cloud

  uk-weather-overlays:
    container_name: uk_weather_overlays
    image: ghcr.io/map-services/metoffice-uk-weather-overlays:latest
    command:
      - "api-server"
      - "--root=/data/metoffice-datahub"
      - "--port=8080"
    volumes:
      - ./data/metoffice-datahub:/data/metoffice-datahub
    restart: always
    healthcheck:
      disable: false
    environment:
      - METOFFICE_DATAHUB_API_KEY=${METOFFICE_DATAHUB_API_KEY}
      - METOFFICE_ORDER_ID=${METOFFICE_ORDER_ID}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.uk-weather-overlays.entrypoints=websecure"
      - "traefik.http.routers.uk-weather-overlays.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/v1/metoffice/datahub`)"
      - "traefik.http.services.uk-weather-overlays.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud

  company-data:
    container_name: company_data
    image: ghcr.io/rm-hull/company-data-api:latest
    command:
      - "api-server"
      - "--db=/data/companies_data.db"
      - "--port=8080"
    volumes:
      - ./data/company-data:/data/
    restart: always
    healthcheck:
      disable: false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.company-data.entrypoints=websecure"
      - "traefik.http.routers.company-data.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/v1/company-data/`)"
      - "traefik.http.services.company-data.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud

  company-data-import:
    container_name: company_data_import
    image: ghcr.io/rm-hull/company-data-api:latest
    command:
      - "import-companies-house"
      - "--db=/data/companies_data.db"
      - "--zip-file=https://download.companieshouse.gov.uk/BasicCompanyDataAsOneFile-{{yyyy}}-{{mm}}-01.zip"
      # See: https://download.companieshouse.gov.uk/en_output.html
    volumes:
      - ./data/company-data:/data/
    restart: no
    healthcheck:
      disable: true

  code-point-import:
    container_name: code_point_import
    image: ghcr.io/rm-hull/company-data-api:latest
    command:
      - "import-code-point"
      - "--db=/data/companies_data.db"
      - "--zip-file=https://api.os.uk/downloads/v1/products/CodePointOpen/downloads?area=GB&format=CSV&redirect"
      # See: https://osdatahub.os.uk/downloads/open/CodePointOpen
    volumes:
      - ./data/company-data:/data/
    restart: no
    healthcheck:
      disable: true

  poi-server:
    container_name: poi_server
    image: ghcr.io/map-services/geods-poi-api:latest
    command:
      - "poi"
      - "http-server"
      - "--db=/data/poi_uk.gpkg"
      - "--port=8080"
    volumes:
      - ./data/geods-poi/poi_uk.gpkg:/data/poi_uk.gpkg:ro
    environment:
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
    restart: always
    healthcheck:
      disable: false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.poi-server.entrypoints=websecure"
      - "traefik.http.routers.poi-server.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/v1/geods-poi/`)"
      - "traefik.http.services.poi-server.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud

  postcode-polygons:
    container_name: postcode_polygons
    image: ghcr.io/map-services/postcode-polygons:latest
    command:
      - api-server
    restart: always
    healthcheck:
      disable: false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.postcode-polygons.entrypoints=websecure"
      - "traefik.http.routers.postcode-polygons.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/v1/postcode/`)"
      - "traefik.http.services.postcode-polygons.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud

  street-manager-relay:
    container_name: street_manager_relay
    image: ghcr.io/map-services/street-manager-relay:latest
    command:
      - api-server
      - "--db=/data/street-manager.db"
      - "--port=8080"
    volumes:
      - ./data/street-manager-relay:/data
    restart: always
    healthcheck:
      disable: false
    environment:
      - SENTRY_DSN=${STREET_MANAGER_RELAY_SENTRY_DSN}
      - MODE=production
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.street-manager-relay.entrypoints=websecure"
      - "traefik.http.routers.street-manager-relay.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/v1/street-manager-relay/`)"
      - "traefik.http.services.street-manager-relay.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud

  place-names:
    container_name: place_names
    image: ghcr.io/map-services/placenames-api:latest
    command:
      - api-server
      - "--file=/data/placenames_with_relevancy.csv.gz"
      - "--port=8080"
      - "--top-k=10"
    restart: always
    healthcheck:
      disable: false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.place-names.entrypoints=websecure"
      - "traefik.http.routers.place-names.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/v1/place-names/`)"
      - "traefik.http.services.place-names.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud

  fuel-prices:
    container_name: fuel_prices
    image: ghcr.io/map-services/fuel-prices-api:latest
    command:
      - "api-server"
      - "--db=/data/fuel_prices.db"
      - "--port=8080"
    volumes:
      - ./data/fuel-prices:/data/
    restart: always
    environment:
      - CLIENT_ID=${FUEL_PRICES_CLIENT_ID}
      - CLIENT_SECRET=${FUEL_PRICES_CLIENT_SECRET}
      - SENTRY_DSN=${FUEL_PRICES_SENTRY_DSN}
      - ENVIRONMENT=${FUEL_PRICES_ENVIRONMENT}
    healthcheck:
      disable: false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.fuel-prices.entrypoints=websecure"
      - "traefik.http.routers.fuel-prices.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/v1/fuel-prices/`)"
      - "traefik.http.services.fuel-prices.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud

  next-departures:
    container_name: next_departures
    image: ghcr.io/map-services/next-departures-api:latest
    command:
      - "api-server"
      - "--db=/data/next_departures.db"
      - "--port=8080"
    volumes:
      - ./data/next-departures:/data/
    restart: always
    environment:
      - SENTRY_DSN=${NEXT_DEPARTURES_SENTRY_DSN}
      - ENVIRONMENT=${NEXT_DEPARTURES_ENVIRONMENT}
      - TRANSPORTAPI_APP_ID=${NEXT_DEPARTURES_TRANSPORTAPI_APP_ID}
      - TRANSPORTAPI_APP_KEY=${NEXT_DEPARTURES_TRANSPORTAPI_APP_KEY}
    healthcheck:
      disable: false
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.next-departures.entrypoints=websecure"
      - "traefik.http.routers.next-departures.rule=Host(`api.hz-nbg1.destructuring-bind.org`) && PathPrefix(`/v1/next-departures/`)"
      - "traefik.http.services.next-departures.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud

  next-departures-import:
    container_name: next_departures_import
    image: ghcr.io/map-services/next-departures-api:latest
    command:
      - "import"
      - "--db=/data/next_departures.db"
    volumes:
      - ./data/next-departures:/data/
    restart: no
    healthcheck:
      disable: true

  map-tiles:
    container_name: map_tiles
    restart: unless-stopped
    image: maptiler/tileserver-gl:latest
    command:
      - "--config=/data/config.json"
      - "--public_url=https://map-tiles.hz-nbg1.destructuring-bind.org"
      - "--log_format=combined"
    volumes:
      - ./data/map-tiles:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hetzner-cloud"
      - "traefik.http.routers.map-tiles.entrypoints=websecure"
      - "traefik.http.routers.map-tiles.rule=Host(`map-tiles.hz-nbg1.destructuring-bind.org`)"
      - "traefik.http.services.map-tiles.loadbalancer.server.port=8080"
    networks:
      - default
      - hetzner-cloud